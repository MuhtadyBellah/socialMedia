<section
  class="bg-gray-200 p-6 md:p-8 shadow-lg rounded-xl w-full max-w-md mx-auto my-10 border border-gray-200"
>
  <div class="container mx-auto p-6 rounded-lg">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Create an Account</h1>
      <p class="text-gray-500 text-sm">Join us today! Please fill in your details below.</p>
    </div>

    <app-alert
      *ngIf="formErrors.length > 0"
      type="danger"
      title="Please fix the following errors:"
      [items]="formErrors"
    ></app-alert>

    <form class="w-full mt-4" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            type="text"
            id="name"
            formControlName="name"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="name"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Full Name</label
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            type="email"
            id="email"
            formControlName="email"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="email"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Email Address</label
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            type="tel"
            id="phone"
            formControlName="phone"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="phone"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Phone Number</label
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <select
            id="gender"
            formControlName="gender"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
          >
            <option value="" disabled selected hidden></option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Prefer not to say</option>
          </select>
          <label
            for="gender"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Gender</label
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            type="date"
            id="dateOfBirth"
            formControlName="dateOfBirth"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="dateOfBirth"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Date of Birth</label
          >
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="password"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Password</label
          >

          <button
            type="button"
            class="absolute right-0 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-600 hover:text-blue-600 z-10 focus:outline-none"
            (click)="togglePasswordVisibility()"
          >
            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            [type]="showRePassword ? 'text' : 'password'"
            id="rePassword"
            formControlName="rePassword"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="rePassword"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Confirm password</label
          >
          <button
            type="button"
            class="absolute right-0 top-1/2 transform -translate-y-1/2 cursor-pointer text-gray-600 hover:text-blue-600 z-10 focus:outline-none"
            (click)="toggleRePasswordVisibility()"
          >
            <i class="fas" [ngClass]="showPassword ? 'fa-eye-slash' : 'fa-eye'"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <svg
          class="w-6 h-6 text-gray-400 shrink-0 mt-3"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
          ></path>
        </svg>
        <div class="relative z-0 w-full group">
          <input
            type="text"
            id="country"
            formControlName="country"
            class="block py-2.5 px-0 w-full text-sm text-gray-900 bg-transparent border-0 border-b-2 border-gray-300 appearance-none focus:outline-none focus:ring-0 focus:border-main peer"
            placeholder=" "
          />
          <label
            for="country"
            class="absolute text-sm text-gray-500 duration-300 transform -translate-y-6 scale-75 top-3 -z-10 origin-left left-0 peer-focus:left-0 peer-focus:text-main peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-6"
            >Country (Optional)</label
          >
        </div>
      </div>

      <div class="flex items-start mb-8 mt-2 ml-10">
        <div class="flex items-center h-5">
          <input
            id="terms"
            type="checkbox"
            formControlName="terms"
            class="w-4 h-4 text-main border border-gray-300 rounded bg-gray-50 focus:ring-3 focus:ring-main/30 cursor-pointer"
          />
        </div>
        <label for="terms" class="ml-2 text-sm font-medium text-gray-600 cursor-pointer">
          I agree with the
          <a href="#" class="text-main font-semibold hover:underline">Terms and Conditions</a> and
          <a href="#" class="text-main font-semibold hover:underline">Privacy Policy</a>.
        </label>
      </div>

      <button
        [disabled]="isSubmitted || registerForm.invalid"
        type="submit"
        class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:outline-none focus:ring-blue-300 font-semibold rounded-lg text-sm px-5 py-3.5 text-center transition-all duration-300 shadow-md hover:shadow-lg active:scale-[0.98] disabled:opacity-70 disabled:cursor-not-allowed flex justify-center items-center"
      >
        @if (isSubmitted) {
          Creating Account...
          <i class="animate-spin text-white fas fa-spinner"></i>
        } @else {
          Register Account
        }
      </button>

      <app-alert
        *ngIf="errorMessage"
        type="danger"
        title="Registration Failed"
        [message]="errorMessage"
      ></app-alert>
      <p class="text-sm text-center text-gray-500 mt-6">
        Already have an account?
        <a routerLink="/auth/login" class="font-bold text-blue-600 hover:underline">Sign in here</a>
      </p>
    </form>
  </div>
</section>
