<nav class="fixed top-0 z-50 w-full bg-white border-b border-gray-200">
  <div class="flex items-center justify-between px-4 py-2 lg:px-8 max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-3">
      <div
        class="flex items-center justify-center w-10 h-10 bg-main text-white rounded-lg font-bold text-2xs tracking-wider shadow-sm"
      >
        ROUTE
      </div>
      <span class="text-xl font-extrabold text-gray-900 whitespace-nowrap"> Route Posts </span>
    </div>
    <div class="hidden md:flex items-center border border-gray-200 rounded-full p-1 shadow-sm">
      <a
        routerLink="/main/home"
        routerLinkActive
        #feed="routerLinkActive"
        class="flex items-center gap-2 px-5 py-2 text-sm rounded-full transition-colors"
        [ngClass]="
          feed.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
          ></path>
        </svg>
        Feed
      </a>

      <a
        routerLink="/main/profile"
        routerLinkActive
        #profile="routerLinkActive"
        class="flex items-center gap-2 px-5 py-2 text-sm rounded-full transition-colors"
        [ngClass]="
          profile.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
      >
        <svg
          class="w-5 h-5"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          ></path>
        </svg>
        Profile
      </a>

      <a
        routerLink="/main/notifications"
        routerLinkActive
        #notifications="routerLinkActive"
        class="flex items-center gap-2 px-5 py-2 text-sm rounded-full transition-colors"
        [ngClass]="
          notifications.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
      >
        <div class="relative">
          <svg
            class="w-5 h-5"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
            ></path>
          </svg>
          @if (notificationCount() > 0) {
            <div
              class="absolute -top-1.5 -right-1.5 flex items-center justify-center w-4 h-4 text-2xs font-bold text-white bg-red-500 border-2 border-white rounded-full"
            >
              {{ notificationCount() }}
            </div>
          }
        </div>
        Notifications
      </a>
    </div>
    <div class="flex items-center">
      <button
        type="button"
        class="flex items-center gap-2 p-1 pr-3 border border-gray-200 rounded-full bg-white shadow-sm hover:bg-gray-50 focus:ring-4 focus:ring-gray-100 transition-all"
        id="user-menu-button"
        aria-expanded="false"
        data-dropdown-toggle="user-dropdown"
        data-dropdown-placement="bottom"
      >
        <img
          class="w-8 h-8 rounded-full object-cover"
          [src]="userProfile.avatar"
          alt="User avatar"
        />
        <span class="text-sm font-medium text-gray-700">{{ userProfile.name }}</span>
        <svg
          class="w-4 h-4 text-gray-400 ml-1"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          ></path>
        </svg>
      </button>

      <div
        class="z-50 hidden my-4 text-base list-none bg-white divide-y divide-gray-100 rounded-lg shadow"
        id="user-dropdown"
      >
        <div class="px-4 py-3">
          <span class="block text-sm text-gray-900">{{ userProfile.name }}</span>
          <span class="block text-sm text-gray-500 truncate">ahmed.reda&#64;example.com</span>
        </div>
        <ul class="py-2" aria-labelledby="user-menu-button">
          <li>
            <a
              routerLink="/settings"
              class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100"
              >Settings</a
            >
          </li>
          <li>
            <a routerLink="/logout" class="block px-4 py-2 text-sm text-red-600 hover:bg-gray-100"
              >Sign out</a
            >
          </li>
        </ul>
      </div>
    </div>
  </div>
</nav>

<div class="pt-16"></div>
