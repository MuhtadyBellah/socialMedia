<header class="sticky top-0 z-40 border-b border-slate-200/90 bg-white/95 backdrop-blur">
  <div
    class="mx-auto flex max-w-7xl items-center justify-between gap-2 px-2 py-1.5 sm:gap-3 sm:px-3"
  >
    <div class="flex items-center gap-3">
      <img alt="Route Posts" class="h-9 w-9 rounded-xl object-cover" src="/images/route.png" />
      <p class="hidden text-xl font-extrabold text-slate-900 sm:block">Route Posts</p>
    </div>
    <nav
      class="flex min-w-0 items-center gap-1 overflow-x-auto rounded-2xl border border-slate-200 bg-slate-50/90 px-1 py-1 sm:px-1.5"
    >
      <a
        aria-current="page"
        routerLink="/home"
        routerLinkActive
        #feed="routerLinkActive"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 bg-white text-[#1f6fe5]"
        [ngClass]="
          feed.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
        data-discover="true"
        ><span class="relative"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-house"
            aria-hidden="true"
          >
            <path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path>
            <path
              d="M3 10a2 2 0 0 1 .709-1.528l7-6a2 2 0 0 1 2.582 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
            ></path></svg></span
        ><span class="hidden sm:inline">Feed</span><span class="sr-only sm:hidden">Feed</span></a
      ><a
        routerLink="/profile"
        routerLinkActive
        #profile="routerLinkActive"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900"
        [ngClass]="
          profile.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
        data-discover="true"
        ><span class="relative"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-user"
            aria-hidden="true"
          >
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle></svg></span
        ><span class="hidden sm:inline">Profile</span
        ><span class="sr-only sm:hidden">Profile</span></a
      ><a
        routerLink="/notifications"
        routerLinkActive
        #notifications="routerLinkActive"
        class="relative flex items-center gap-1.5 rounded-xl px-2.5 py-2 text-sm font-extrabold transition sm:gap-2 sm:px-3.5 text-slate-600 hover:bg-white/90 hover:text-slate-900"
        [ngClass]="
          notifications.isActive
            ? 'text-blue-600 bg-blue-50/50 font-semibold'
            : 'text-gray-500 hover:text-gray-900 hover:bg-gray-50 font-medium'
        "
        data-discover="true"
        ><span class="relative"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-message-circle"
            aria-hidden="true"
          >
            <path
              d="M2.992 16.342a2 2 0 0 1 .094 1.167l-1.065 3.29a1 1 0 0 0 1.236 1.168l3.413-.998a2 2 0 0 1 1.099.092 10 10 0 1 0-4.777-4.719"
            ></path>
          </svg>
          @if (notificationCount() > 0) {
            <div
              class="absolute -top-1.5 -right-1.5 flex items-center justify-center w-4 h-4 text-2xs font-bold text-white bg-red-500 border-2 border-white rounded-full"
            >
              {{ notificationCount() }}
            </div>
          }</span
        ><span class="hidden sm:inline">Notifications</span
        ><span class="sr-only sm:hidden">Notifications</span></a
      >
    </nav>
    <div class="relative">
      <button
        type="button"
        (click)="toggleProfileDropdown()"
        class="flex items-center gap-2 rounded-full border border-slate-200 bg-slate-50 px-2 py-1.5 transition hover:bg-slate-100"
        [attr.aria-expanded]="isProfileDropdownOpen()"
      >
        <img
          [alt]="userProfile.name"
          class="h-8 w-8 rounded-full object-cover"
          [src]="userProfile.avatar"
        /><span class="hidden max-w-35 truncate text-sm font-semibold text-slate-800 md:block">{{
          userProfile.name
        }}</span
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="15"
          height="15"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-menu text-slate-500"
          aria-hidden="true"
        >
          <path d="M4 5h16"></path>
          <path d="M4 12h16"></path>
          <path d="M4 19h16"></path>
        </svg>
      </button>
      @if (isProfileDropdownOpen()) {
        <div
          class="absolute right-0 z-50 mt-2 w-52 rounded-xl border border-slate-200 bg-white p-2 shadow-lg"
        >
          <button
            (click)="closeDropdown()"
            routerLink="/profile"
            class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-user"
              aria-hidden="true"
            >
              <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle></svg
            >Profile
          </button>
          <button
            (click)="closeDropdown()"
            routerLink="/settings"
            class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-settings"
              aria-hidden="true"
            >
              <path
                d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
              ></path>
              <circle cx="12" cy="12" r="3"></circle></svg
            >Settings
          </button>
          <div class="my-1 border-t border-slate-200"></div>
          <button
            (click)="logout()"
            class="flex w-full items-center gap-2 rounded-lg px-3 py-2 text-sm font-semibold text-rose-600 hover:bg-rose-50"
          >
            🚪 Logout
          </button>
        </div>
      }
    </div>
  </div>
</header>
