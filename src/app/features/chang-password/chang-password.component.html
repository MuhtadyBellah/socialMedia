<div class="mx-auto max-w-2xl">
  <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm sm:p-6">
    <div class="mb-5 flex items-center gap-3">
      <span
        class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-[#e7f3ff] text-[#1877f2]"
        ><svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-key-round"
          aria-hidden="true"
        >
          <path
            d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z"
          ></path>
          <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle></svg
      ></span>
      <div>
        <h1 class="text-xl font-extrabold text-slate-900 sm:text-2xl">Change Password</h1>
        <p class="text-sm text-slate-500">Keep your account secure by using a strong password.</p>
      </div>
    </div>

    <app-alert
      *ngIf="formErrors.length > 0"
      type="danger"
      title="Please fix the following errors:"
      [items]="formErrors"
    ></app-alert>

    <form class="space-y-4" [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
      <div class="relative w-full">
        <label class="block"
          ><span class="mb-1.5 block text-sm font-bold text-slate-700">Current password</span
          ><div class="relative">
            <input
              placeholder="Enter current password"
              class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 pr-10 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-[#1877f2] focus:bg-white"
              [type]="showCurPassword() ? 'text' : 'password'"
              name="password"
              formControlName="password"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 hover:text-blue-600 transition focus:outline-none"
              (click)="toggleCurPasswordVisibility()"
              tabindex="-1"
            >
              <i class="fas" [ngClass]="showCurPassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </label>
      </div>

      <div class="relative w-full">
        <label class="block"
          ><span class="mb-1.5 block text-sm font-bold text-slate-700">New password</span
          ><div class="relative">
            <input
              placeholder="Enter new password"
              class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 pr-10 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-[#1877f2] focus:bg-white"
              [type]="showPassword() ? 'text' : 'password'"
              name="newPassword"
              formControlName="newPassword"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 hover:text-blue-600 transition focus:outline-none"
              (click)="togglePasswordVisibility()"
              tabindex="-1"
            >
              <i class="fas" [ngClass]="showPassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </label>
      </div>

      <div class="relative w-full">
        <label class="block"
          ><span class="mb-1.5 block text-sm font-bold text-slate-700">Confirm new password</span
          ><div class="relative">
            <input
              placeholder="Re-enter new password"
              class="w-full rounded-xl border bg-slate-50 px-3 py-2.5 pr-10 text-sm text-slate-800 outline-none transition border-slate-200 focus:border-[#1877f2] focus:bg-white"
              [type]="showRePassword() ? 'text' : 'password'"
              name="confirmPassword"
              formControlName="rePassword"
            />
            <button
              type="button"
              class="absolute right-3 top-1/2 -translate-y-1/2 cursor-pointer text-gray-400 hover:text-blue-600 transition focus:outline-none"
              (click)="toggleRePasswordVisibility()"
              tabindex="-1"
            >
              <i class="fas" [ngClass]="showRePassword() ? 'fa-eye-slash' : 'fa-eye'"></i>
            </button>
          </div>
        </label>
      </div>
      <button
        type="submit"
        [disabled]="changePasswordForm.invalid"
        class="inline-flex w-full items-center justify-center rounded-xl bg-[#1877f2] px-4 py-2.5 text-sm font-bold text-white transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:opacity-60"
      >
        Update password
      </button>
    </form>
  </section>
</div>
