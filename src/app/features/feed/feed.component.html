<app-create-post></app-create-post>

@for (post of posts; track post._id) {
  <div class="space-y-4">
    <app-single-post [post]="post"></app-single-post>
  </div>
} @empty {
  <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center shadow-sm">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="48"
      height="48"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      class="lucide lucide-inbox mx-auto mb-4 text-slate-400"
      aria-hidden="true"
    >
      <polyline points="4 4 4 20 20 20 20 4"></polyline>
      <line x1="4" x2="20" y1="8" y2="8"></line>
    </svg>
    <p class="text-slate-600 font-medium">No posts in your feed yet</p>
    <p class="text-slate-500 text-sm mt-1">Follow more users to see their posts</p>
  </div>
}

@if (posts.length > 0) {
  <div class="flex min-h-10 items-center justify-center">
    <span class="text-xs font-semibold text-slate-400">You reached the end</span>
  </div>
}
