<div class="grid gap-4 xl:grid-cols-[240px_minmax(0,1fr)_300px]">
  <aside class="hidden h-fit space-y-3 xl:sticky xl:top-21 xl:block">
    <div class="rounded-2xl border border-slate-200 bg-white p-3 shadow-sm">
      <button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
        (click)="loadFeed()"
        [ngClass]="
          activeTab() === 'feed'
            ? 'bg-[#e7f3ff] text-[#1877f2]'
            : 'mt-1 text-slate-700 hover:bg-slate-100'
        "
        aria-label="View feed"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-newspaper"
          aria-hidden="true"
        >
          <path d="M15 18h-5"></path>
          <path d="M18 14h-8"></path>
          <path
            d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9a2 2 0 0 1 2-2h2"
          ></path>
          <rect width="8" height="4" x="10" y="6" rx="1"></rect></svg
        >Feed</button
      ><button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
        (click)="loadMyPosts()"
        [ngClass]="
          activeTab() === 'myPosts'
            ? 'bg-[#e7f3ff] text-[#1877f2]'
            : 'mt-1 text-slate-700 hover:bg-slate-100'
        "
        aria-label="View my posts"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-sparkles"
          aria-hidden="true"
        >
          <path
            d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
          ></path>
          <path d="M20 2v4"></path>
          <path d="M22 4h-4"></path>
          <circle cx="4" cy="20" r="2"></circle></svg
        >My Posts</button
      ><button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
        (click)="loadALLPosts()"
        [ngClass]="
          activeTab() === 'community'
            ? 'bg-[#e7f3ff] text-[#1877f2]'
            : 'mt-1 text-slate-700 hover:bg-slate-100'
        "
        aria-label="View community posts"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-earth"
          aria-hidden="true"
        >
          <path d="M21.54 15H17a2 2 0 0 0-2 2v4.54"></path>
          <path
            d="M7 3.34V5a3 3 0 0 0 3 3a2 2 0 0 1 2 2c0 1.1.9 2 2 2a2 2 0 0 0 2-2c0-1.1.9-2 2-2h3.17"
          ></path>
          <path d="M11 21.95V18a2 2 0 0 0-2-2a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2H2.05"></path>
          <circle cx="12" cy="12" r="10"></circle></svg
        >Community</button
      ><button
        type="button"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-2 text-left text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
        (click)="loadSavedPosts()"
        [ngClass]="
          activeTab() === 'saved'
            ? 'bg-[#e7f3ff] text-[#1877f2]'
            : 'mt-1 text-slate-700 hover:bg-slate-100'
        "
        aria-label="View saved posts"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="17"
          height="17"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-bookmark"
          aria-hidden="true"
        >
          <path
            d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"
          ></path></svg
        >Saved
      </button>
    </div>
  </aside>
  <section class="space-y-4">
    <div class="rounded-2xl border border-slate-200 bg-white p-2 shadow-sm xl:hidden">
      <div class="grid grid-cols-2 gap-2">
        <button
          type="button"
          class="flex items-center justify-center gap-2 rounded-xl px-3 py-2 text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
          (click)="loadFeed()"
          [ngClass]="
            activeTab() === 'feed'
              ? 'bg-[#e7f3ff] text-[#1877f2]'
              : 'bg-slate-50 mt-1 text-slate-700 hover:bg-slate-100'
          "
          aria-label="View feed"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-newspaper"
            aria-hidden="true"
          >
            <path d="M15 18h-5"></path>
            <path d="M18 14h-8"></path>
            <path
              d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0v-9a2 2 0 0 1 2-2h2"
            ></path>
            <rect width="8" height="4" x="10" y="6" rx="1"></rect></svg
          >Feed</button
        ><button
          type="button"
          class="flex items-center justify-center gap-2 rounded-xl px-3 py-2 text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
          (click)="loadMyPosts()"
          [ngClass]="
            activeTab() === 'myPosts'
              ? 'bg-[#e7f3ff] text-[#1877f2]'
              : 'bg-slate-50 mt-1 text-slate-700 hover:bg-slate-100'
          "
          aria-label="View my posts"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-sparkles"
            aria-hidden="true"
          >
            <path
              d="M11.017 2.814a1 1 0 0 1 1.966 0l1.051 5.558a2 2 0 0 0 1.594 1.594l5.558 1.051a1 1 0 0 1 0 1.966l-5.558 1.051a2 2 0 0 0-1.594 1.594l-1.051 5.558a1 1 0 0 1-1.966 0l-1.051-5.558a2 2 0 0 0-1.594-1.594l-5.558-1.051a1 1 0 0 1 0-1.966l5.558-1.051a2 2 0 0 0 1.594-1.594z"
            ></path>
            <path d="M20 2v4"></path>
            <path d="M22 4h-4"></path>
            <circle cx="4" cy="20" r="2"></circle></svg
          >My Posts</button
        ><button
          type="button"
          class="flex items-center justify-center gap-2 rounded-xl px-3 py-2 text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
          (click)="loadALLPosts()"
          [ngClass]="
            activeTab() === 'community'
              ? 'bg-[#e7f3ff] text-[#1877f2]'
              : 'bg-slate-50 mt-1 text-slate-700 hover:bg-slate-100'
          "
          aria-label="View community posts"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-earth"
            aria-hidden="true"
          >
            <path d="M21.54 15H17a2 2 0 0 0-2 2v4.54"></path>
            <path
              d="M7 3.34V5a3 3 0 0 0 3 3a2 2 0 0 1 2 2c0 1.1.9 2 2 2a2 2 0 0 0 2-2c0-1.1.9-2 2-2h3.17"
            ></path>
            <path d="M11 21.95V18a2 2 0 0 0-2-2a2 2 0 0 1-2-2v-1a2 2 0 0 0-2-2H2.05"></path>
            <circle cx="12" cy="12" r="10"></circle></svg
          >Community</button
        ><button
          type="button"
          class="flex items-center justify-center gap-2 rounded-xl px-3 py-2 text-sm font-bold transition disabled:cursor-not-allowed disabled:opacity-50"
          (click)="loadSavedPosts()"
          [ngClass]="
            activeTab() === 'saved'
              ? 'bg-[#e7f3ff] text-[#1877f2]'
              : 'bg-slate-50 mt-1 text-slate-700 hover:bg-slate-100'
          "
          aria-label="View saved posts"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-bookmark"
            aria-hidden="true"
          >
            <path
              d="M17 3a2 2 0 0 1 2 2v15a1 1 0 0 1-1.496.868l-4.512-2.578a2 2 0 0 0-1.984 0l-4.512 2.578A1 1 0 0 1 5 20V5a2 2 0 0 1 2-2z"
            ></path></svg
          >Saved
        </button>
      </div>
    </div>

    @if (suggestions().length > 0) {
      <div class="space-y-3 xl:hidden">
        <button
          type="button"
          routerLink="/suggestions"
          class="inline-flex w-full items-center justify-between rounded-2xl border border-slate-200 bg-white px-4 py-3 text-left shadow-sm transition hover:bg-slate-50"
          aria-label="View suggested friends"
        >
          <span class="inline-flex items-center gap-2 text-sm font-extrabold text-slate-900"
            ><svg
              xmlns="http://www.w3.org/2000/svg"
              width="17"
              height="17"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-users text-[#1877f2]"
              aria-hidden="true"
            >
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
              <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
              <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
              <circle cx="9" cy="7" r="4"></circle></svg
            >Suggested Friends</span
          ><span class="inline-flex items-center gap-2"
            ><span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600">
              {{ suggestions().length }}
            </span>
            <span class="text-xs font-bold text-[#1877f2]">Show</span>
          </span>
        </button>
      </div>
    }

    @if (hasError()) {
      <div class="rounded-2xl border border-red-200 bg-red-50 p-6 text-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-alert-circle mx-auto mb-3 text-red-500"
          aria-hidden="true"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" x2="12" y1="8" y2="12"></line>
          <line x1="12" x2="12.01" y1="16" y2="16"></line>
        </svg>
        <p class="mb-3 text-sm font-semibold text-red-800">{{ errorMessage() }}</p>
        <button
          type="button"
          (click)="retryLoad()"
          class="inline-flex items-center gap-2 rounded-lg bg-red-600 px-4 py-2 text-sm font-bold text-white transition hover:bg-red-700"
          aria-label="Retry loading"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-refresh-cw"
            aria-hidden="true"
          >
            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
            <path d="M21 3v5h-5"></path>
            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
            <path d="M8 16H3v5"></path>
          </svg>
          Try Again
        </button>
      </div>
    } @else if (isLoading()) {
      <div class="rounded-2xl border border-slate-200 bg-white p-8 text-center">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="48"
          height="48"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-loader mx-auto mb-3 animate-spin text-[#1877f2]"
          aria-hidden="true"
        >
          <path d="M12 2v20m4.22-4.22-14.14-14.14M20 12H0m-4.22 4.22 14.14 14.14"></path>
        </svg>
        <p class="text-sm font-semibold text-slate-600">Loading posts...</p>
      </div>
    } @else {
      <app-feed [posts]="posts()"></app-feed>
    }
  </section>
  <aside class="hidden h-fit xl:sticky xl:top-21 xl:block">
    <app-suggested [mode]="'sidebar'"></app-suggested>
  </aside>
</div>
