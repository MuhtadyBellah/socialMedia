<div [ngClass]="mode === 'full' ? 'mx-auto max-w-4xl space-y-4' : ''">
  @if (mode === 'full') {
    <button
      class="inline-flex items-center gap-2 rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-50"
      routerLink="/home"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-arrow-left"
        aria-hidden="true"
      >
        <path d="m12 19-7-7 7-7"></path>
        <path d="M19 12H5"></path></svg
      >Back to feed
    </button>
  }

  <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
    <div class="mb-3 flex items-center justify-between gap-2">
      <div class="flex items-center gap-2">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          class="lucide lucide-users text-[#1877f2]"
          aria-hidden="true"
        >
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
          <path d="M16 3.128a4 4 0 0 1 0 7.744"></path>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
          <circle cx="9" cy="7" r="4"></circle>
        </svg>
        <h1
          class="text-xl font-extrabold text-slate-900"
          [ngClass]="mode === 'sidebar' ? 'text-base' : 'text-xl'"
        >
          {{ mode === 'sidebar' ? 'Suggested Friends' : 'All Suggested Friends' }}
        </h1>
      </div>
      <span class="rounded-full bg-slate-100 px-2 py-0.5 text-xs font-bold text-slate-600">{{
        users.length
      }}</span>
    </div>
    <label class="relative mb-4 block"
      ><svg
        xmlns="http://www.w3.org/2000/svg"
        width="16"
        height="16"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        class="lucide lucide-search pointer-events-none absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"
        aria-hidden="true"
      >
        <path d="m21 21-4.34-4.34"></path>
        <circle cx="11" cy="11" r="8"></circle></svg
      ><input
        [placeholder]="mode === 'sidebar' ? 'Search friends...' : 'Search by name or username...'"
        class="w-full rounded-xl border border-slate-200 bg-slate-50 text-sm text-slate-700 outline-none focus:border-[#1877f2] focus:bg-white"
        [ngClass]="mode === 'sidebar' ? 'py-2 pl-9 pr-3' : 'py-2.5 pl-10 pr-3'"
        value=""
    /></label>
    <div [ngClass]="mode === 'sidebar' ? 'space-y-3' : 'grid gap-3 sm:grid-cols-2'">
      @for (user of users; track $index) {
        <article
          class="rounded-xl border border-slate-200"
          [ngClass]="mode === 'sidebar' ? 'p-2.5' : 'p-3'"
        >
          <div class="flex items-center justify-between gap-3">
            <button
              type="button"
              class="flex min-w-0 items-center gap-3 rounded-lg px-1 py-1 text-left transition hover:bg-slate-50"
            >
              <img
                [alt]="user.name"
                [src]="user.photo"
                [ngClass]="mode === 'sidebar' ? 'h-10 w-10' : 'h-12 w-12 rounded-full object-cover'"
              />
              <div class="min-w-0">
                <p class="truncate text-sm font-bold text-slate-900 hover:underline">
                  {{ user.name }}
                </p>
                <p class="truncate text-xs text-slate-500">{{ user.email }}</p>
              </div></button
            ><button
              class="inline-flex items-center gap-1 rounded-full px-3 py-1.5 text-xs font-bold transition disabled:opacity-60 bg-[#e7f3ff] text-[#1877f2] hover:bg-[#d8ebff]"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="13"
                height="13"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-user-plus"
                aria-hidden="true"
              >
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <line x1="19" x2="19" y1="8" y2="14"></line>
                <line x1="22" x2="16" y1="11" y2="11"></line></svg
              >Follow
            </button>
          </div>
          <div class="mt-2 flex items-center gap-2 text-[11px] font-semibold text-slate-500">
            <span class="rounded-full bg-slate-100 px-2 py-0.5"
              >{{ user.followingCount }} followers</span
            >
          </div>
        </article>
      }
    </div>
    <button
      class="mt-4 inline-flex w-full items-center justify-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-bold text-slate-700 transition hover:bg-slate-100 disabled:opacity-60"
      [ngClass]="mode === 'sidebar' ? 'mt-3' : 'mt-4'"
      (click)="viewMore()"
    >
      {{ mode === 'sidebar' ? 'View more' : 'Load more users' }}
    </button>
  </section>
</div>
