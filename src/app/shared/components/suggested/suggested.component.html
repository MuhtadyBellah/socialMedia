<div class="bg-white rounded-2xl shadow-sm p-5 border border-gray-100">
  <div class="flex justify-between items-center mb-4">
    <h2 class="flex items-center gap-2 font-extrabold text-gray-900 text-lg">
      <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"
        ></path>
      </svg>
      Suggested Friends
    </h2>
    <span class="bg-gray-100 text-gray-600 text-xs font-bold px-2.5 py-1 rounded-full">5</span>
  </div>

  <div class="relative mb-5">
    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </div>
    <input
      type="text"
      class="block w-full p-2.5 pl-10 text-sm text-gray-900 border border-gray-200 rounded-xl bg-gray-50 focus:ring-blue-500 focus:border-blue-500"
      placeholder="Search friends..."
    />
  </div>

  <div class="space-y-4">
    @for (friend of suggestedFriends; track friend.username) {
      <div class="p-3 border border-gray-100 rounded-xl hover:bg-gray-50 transition cursor-pointer">
        <div class="flex items-center justify-between mb-2">
          <div class="flex items-center gap-2">
            <img
              class="w-10 h-10 rounded-full object-cover"
              [src]="friend.avatar"
              [alt]="friend.name"
            />
            <div>
              <h4 class="font-bold text-gray-900 text-sm leading-tight">
                {{ friend.name }}
              </h4>
              <p class="text-gray-500 text-xs">{{ friend.username }}</p>
            </div>
          </div>
          <button
            class="flex items-center gap-1 bg-blue-50 hover:bg-blue-100 text-blue-600 px-3 py-1.5 rounded-full text-xs font-semibold transition"
          >
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
              ></path>
            </svg>
            Follow
          </button>
        </div>
        <div class="flex gap-2">
          <span class="bg-gray-100 text-gray-600 text-2xs font-semibold px-2 py-1 rounded-md"
            >{{ friend.followers }} followers</span
          >
          <span class="bg-blue-50 text-blue-600 text-2xs font-semibold px-2 py-1 rounded-md"
            >{{ friend.mutual }} mutual</span
          >
        </div>
      </div>
    }
  </div>
</div>
