<form [formGroup]="commentForm" (ngSubmit)="onSubmit()">
  <div class="flex items-start gap-2">
    <img
      alt="Current User"
      class="h-9 w-9 rounded-full object-cover"
      src="https://pub-3cba56bacf9f4965bbb0989e07dada12.r2.dev/linkedPosts/default-profile.png"
    />
    <div
      class="w-full rounded-2xl border border-slate-200 bg-secondary px-2.5 py-1.5 focus-within:border-[#c7dafc] focus-within:bg-white"
      data-comment-mention-root="true"
    >
      <textarea
        formControlName="content"
        placeholder="Write a {{ mode === 'reply' ? 'reply' : 'comment' }}..."
        rows="1"
        class="max-h-55 min-h-10 w-full resize-none bg-transparent px-2 py-1.5 text-sm leading-5 outline-none placeholder:text-slate-500"
        [(ngModel)]="postText"
      ></textarea>

      @if (imagePreview()) {
        <div class="relative mt-2">
          <img
            alt="{{ mode }} preview"
            class="max-h-52 w-full rounded-lg object-cover"
            [src]="imagePreview()"
          />
          <button
            type="button"
            class="absolute right-2 top-2 rounded-full bg-black/60 p-1 text-white hover:bg-black/80"
            (click)="removeImage()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
      }

      <div class="mt-1 flex items-center justify-between">
        <!-- Left actions -->
        <div class="flex items-center gap-1">
          <!-- Upload -->
          <label
            class="inline-flex h-8 w-8 cursor-pointer items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-200 hover:text-emerald-600"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="18" height="18" x="3" y="3" rx="2" ry="2"></rect>
              <circle cx="9" cy="9" r="2"></circle>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"></path>
            </svg>

            <input
              formControlName="image"
              [(ngModel)]="selectedImage"
              accept="image/*"
              class="hidden"
              type="file"
              (change)="onImageSelected($event)"
            />
          </label>

          <!-- Emoji button -->
          <button
            type="button"
            class="inline-flex h-8 w-8 items-center justify-center rounded-full text-slate-500 transition hover:bg-slate-200 hover:text-amber-500"
            (click)="togglePicker()"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
              <line x1="9" x2="9.01" y1="9" y2="9"></line>
              <line x1="15" x2="15.01" y1="9" y2="9"></line>
            </svg>
          </button>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="inline-flex h-9 w-9 items-center justify-center rounded-full bg-[#1877f2] text-white shadow-sm transition hover:bg-[#166fe5] disabled:cursor-not-allowed disabled:bg-[#9ec5ff] disabled:opacity-100"
          [disabled]="isSubmitDisabled()"
        >
          @if (isSubmitting()) {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="animate-spin"
            >
              <path d="M12 2v20m4.22-4.22-14.14-14.14M20 12H0m-4.22 4.22 14.14 14.14"></path>
            </svg>
          } @else {
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M3.714 3.048a.498.498 0 0 0-.683.627l2.843 7.627a2 2 0 0 1 0 1.396l-2.842 7.627a.498.498 0 0 0 .682.627l18-8.5a.5.5 0 0 0 0-.904z"
              ></path>
              <path d="M6 12h16"></path>
            </svg>
          }
        </button>
      </div>

      <!-- Emoji Picker -->
      @if (showPicker()) {
        <div class="relative">
          <div
            class="absolute left-0 top-2 z-50 -ml-14 w-120 overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl"
          >
            <app-emojy size="sm" (emojiSelected)="onEmojiSelected($event)"></app-emojy>
          </div>
        </div>
      }
    </div>
  </div>

  @if (errorMessage()) {
    <div class="mt-2 rounded-lg bg-rose-50 p-3 text-sm text-rose-600">
      {{ errorMessage() }}
    </div>
  }
</form>
